[tool.poetry]
name = "chaturbate-event-listener"
version = "0.1.0"
description = "Poller for the Chaturbate events API."
authors = ["MountainGod2"]
license = "MIT"
readme = "README.md"
repository = "https://github.com/MountainGod2/chaturbate_poller"
documentation = "https://mountaingod2.github.io/chaturbate_poller/"

[tool.poetry.dependencies]
python = ">=3.10,<3.11.0 || >3.11.0,<4.0"
asyncio = "^3.4.3"
aiohttp = "^3.9.5"
backoff = "^2.2.1"
bandit = "^1.7.8"

[tool.poetry.dev-dependencies]

[tool.poetry.group.dev.dependencies]
aioresponses = "^0.7.6"
asynctest = "^0.13.0"
click = "^8.1.7"
mypy = "^1.9.0"
myst-nb = { version = "^1.1.0", python = "^3.9" }
poetry = "^1.8.2"
pre-commit = "^3.7.0"
pytest = "^8.2.0"
pytest-aiohttp = "^1.0.5"
pytest-asyncio = "^0.23.6"
pytest-cov = "^5.0.0"
pytest-html = "^4.1.1"
pytest-mock = "^3.14.0"
pytest-timeout = "^2.3.1"
python-dotenv = "^1.0.1"
python-semantic-release = "^9.4.0"
ruff = "^0.3.4"
scalene = "^1.5.41"
sphinx-autoapi = "^3.0.0"
sphinx-rtd-theme = "^2.0.0"

[tool.poetry.group.docs.dependencies]
myst-nb = "^1.1.0"
sphinx-autoapi = "^3.0.0"
sphinx-rtd-theme = "^2.0.0"

[tool.coverage.run]
source = ['chaturbate_event_listener']
relative_files = true

[tool.semantic_release]
version_variable = "pyproject.toml:version"
version_toml = [
  "pyproject.toml:tool.poetry.version",
] # version location
branch = "main" # branch to make releases of
changelog_file = "CHANGELOG.md" # changelog file
build_command = "pip install poetry && poetry build" # build dists

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
addopts = "--strict-markers"
generate_report_on_test = "True"
asyncio_mode = "strict"

[tool.ruff]
exclude = [
  ".bzr",
  ".direnv",
  ".eggs",
  ".git",
  ".git-rewrite",
  ".hg",
  ".ipynb_checkpoints",
  ".mypy_cache",
  ".nox",
  ".pants.d",
  ".pyenv",
  ".pytest_cache",
  ".pytype",
  ".ruff_cache",
  ".svn",
  ".tox",
  ".venv",
  ".vscode",
  "__pypackages__",
  "_build",
  "buck-out",
  "build",
  "dist",
  "node_modules",
  "site-packages",
  "venv",
]
src = ["src", "test"]
line-length = 88
indent-width = 4
target-version = "py311"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "COM812", # missing-trailing-comma
  "ISC001", # single-line-implicit-string-concatenation
  "ANN101",
  "ANN102", # missing-type-self (redundant)
  "D203", # one-blank-line-before-class (incompatable)
  "D213", # multi-line-summary-second-line (incompatable)
  "S101", # disable assert warning for tests
]
fixable = ["ALL"]
unfixable = []
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = "dynamic"

[tool.mypy]
exclude = [
    "./ci.log",
]

[tool.bandit]
exclude_dirs = ["tests",".venv"]
